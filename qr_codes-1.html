<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Proton Security — QR Codes</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Open Sans',sans-serif;background:#f0f2f8;color:#222}
.topbar{background:linear-gradient(135deg,#0f1f5c,#1a2a6c);color:#D4A017;padding:16px 28px;display:flex;align-items:center;gap:16px}
.topbar img{width:44px;height:44px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.topbar .brand{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:800;letter-spacing:2px}
.topbar .sub{font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px;letter-spacing:1px}
.controls{background:#fff;padding:14px 28px;border-bottom:1px solid #e0e4f0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.controls input{padding:8px 14px;border:1.5px solid #dde3f0;border-radius:7px;font-size:13px;width:240px;font-family:'Open Sans',sans-serif}
.controls input:focus{outline:none;border-color:#1a2a6c}
.controls button{padding:9px 18px;background:#D4A017;color:#1a2a6c;border:none;border-radius:7px;font-weight:700;cursor:pointer;font-size:13px;font-family:'Montserrat',sans-serif;letter-spacing:1px}
.controls button:hover{background:#b8891a}
.count{font-size:12px;color:#888;margin-left:auto;font-weight:600}
.grid{display:flex;flex-wrap:wrap;gap:18px;padding:24px 28px}
.card{background:#fff;border-radius:12px;padding:18px 14px 14px;width:240px;box-shadow:0 2px 12px rgba(26,42,108,0.09);display:flex;flex-direction:column;align-items:center;border-top:4px solid #D4A017}
.card .badge{background:#1a2a6c;color:#D4A017;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:9px;letter-spacing:1px;font-family:'Montserrat',sans-serif}
.card .loc-name{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#1a2a6c;text-align:center;margin-bottom:3px;min-height:32px;display:flex;align-items:center;justify-content:center}
.card .meta{font-size:10px;color:#999;margin-bottom:10px;text-align:center}
.card .qr-box{width:170px;height:170px;display:flex;align-items:center;justify-content:center}
.card .qr-box canvas,.card .qr-box img{width:170px!important;height:170px!important}
.card .footer-note{font-size:9px;color:#bbb;margin-top:9px;text-align:center;letter-spacing:.5px}
@media print{
  body{background:#fff}
  .controls,.topbar{display:none}
  .grid{padding:0;gap:10px}
  .card{box-shadow:none;border:1px solid #ddd;width:210px;page-break-inside:avoid}
}
</style>
</head>

  <div>
    <div class="brand">PROTON SECURITY</div>
    <div class="sub">QR CODE DIRECTORY — SITREP SYSTEM</div>
  </div>
</div>
<div class="controls">
  <input type="text" placeholder="Search location..." oninput="filterCards(this.value)" id="srch">
  <button onclick="window.print()">🖨 Print All QR Codes</button>
  <span class="count" id="cnt"></span>
</div>
<div class="grid" id="grid"></div>
<script>
const FORM_URL = "PASTE_YOUR_GITHUB_FORM_URL_HERE/form.html";
const locations = [
  {location:"Proton Ajah",        zone:"Lagos Island",  area:"Ajah",         oc:"Commander Ajah"},
  {location:"Proton Yaba",        zone:"Lagos Mainland",area:"Yaba",         oc:"Commander Yaba"},
  {location:"Proton Ikeja",       zone:"Lagos Mainland",area:"Ikeja",        oc:"Commander Ikeja"},
  {location:"Proton Orile",       zone:"Lagos Mainland",area:"Orile",        oc:"Commander Orile"},
  {location:"Proton Imo",         zone:"South East",    area:"Imo State",    oc:"Commander Imo"},
  {location:"Proton Port-Harcourt",zone:"South South",  area:"Port Harcourt",oc:"Commander PH"}
];
const cards=[];
function buildURL(loc){
  const p=new URLSearchParams({location:loc.location,zone:loc.zone,area:loc.area,oc:loc.oc});
  return FORM_URL+'?'+p.toString();
}
function makeCard(loc,idx){
  const div=document.createElement('div');
  div.className='card';
  div.dataset.loc=loc.location.toLowerCase();
  div.innerHTML=`
    <span class="badge">${loc.area.toUpperCase()}</span>
    <div class="loc-name">${loc.location}</div>
    <div class="meta">${loc.zone} &bull; ${loc.oc}</div>
    <div class="qr-box" id="qr-${idx}"></div>
    <div class="footer-note">SCAN TO SUBMIT DAILY SITREP</div>
  `;
  document.getElementById('grid').appendChild(div);
  new QRCode(document.getElementById('qr-'+idx),{
    text:buildURL(loc),width:170,height:170,
    colorDark:"#1a2a6c",colorLight:"#ffffff",
    correctLevel:QRCode.CorrectLevel.M
  });
  cards.push(div);
}
function filterCards(q){
  let v=0;
  cards.forEach(c=>{
    const show=!q||c.dataset.loc.includes(q.toLowerCase());
    c.style.display=show?'':'none';
    if(show)v++;
  });
  document.getElementById('cnt').textContent=v+' locations';
}
locations.forEach((l,i)=>makeCard(l,i));
document.getElementById('cnt').textContent=locations.length+' locations';
</script>
